[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[rpc_endpoints]
megaeth_testnet = "${MEGAETH_RPC_URL}"
megaeth         = "${MEGAETH_MAINNET_RPC_URL}"

[etherscan]
megaeth_testnet = { key = "${BLOCKSCOUT_KEY}", url = "https://megaeth-testnet-v2.blockscout.com/api", chain = 6342 }
megaeth         = { key = "${MEGAETH_EXPLORER_KEY}", url = "${MEGAETH_EXPLORER_API_URL}", chain = 4326 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
